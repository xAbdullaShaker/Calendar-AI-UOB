<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#003087"/>
  <!-- Subtle gradient overlay -->
  <rect width="32" height="32" rx="7" fill="url(#grad)" opacity="0.4"/>
  <!-- Gold "U" letter -->
  <text x="16" y="22.5" font-family="Georgia, 'Times New Roman', serif"
        font-size="19" font-weight="bold" fill="#C9A84C"
        text-anchor="middle" dominant-baseline="auto">U</text>
  <!-- Gold underline accent -->
  <rect x="7" y="26" width="18" height="2" rx="1" fill="#C9A84C" opacity="0.75"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
</svg>